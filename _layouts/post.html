---
layout: default
---
<article class="post">
    <header>
        <h1>{{ page.title }}</h1>
        <p class="meta">
            <time datetime="{{ page.date | date_to_xmlschema }}">
                {{ page.date | date: "%-d %B %Y" }}
            </time>
        </p>
    </header>

    {{ content }}
</article>

<nav class="post-nav">
    <a href="{{ '/' | relative_url }}">&larr; Back to writing</a>
</nav>
